services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      # Point these at your OpenAI-compatible LLM endpoint.
      LLM_ENDPOINT: "http://host.docker.internal:9000/v1/chat/completions"
      LLM_MODEL: "Intel/neural-chat-7b-v3-3"
      LOG_LEVEL: "INFO"
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  ui:
    build: .
    ports:
      - "8501:8501"
    environment:
      DRIFTGUARDIAN_API: "http://backend:8000"
    depends_on:
      - backend
    command: streamlit run app.py --server.address 0.0.0.0 --server.port 8501
