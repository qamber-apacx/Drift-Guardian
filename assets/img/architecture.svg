<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" font-family="Helvetica, Arial, sans-serif">
  <rect width="880" height="360" fill="#ffffff"/>
  <text x="440" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#14110f">PolicyDriftCheck — Architecture</text>

  <!-- User / UI -->
  <rect x="30" y="120" width="150" height="80" rx="8" fill="#f3e6f1" stroke="#C26DBC" stroke-width="2"/>
  <text x="105" y="150" text-anchor="middle" font-size="14" font-weight="bold" fill="#14110f">User / Flask UI</text>
  <text x="105" y="172" text-anchor="middle" font-size="11" fill="#6b6358">upload documents</text>
  <text x="105" y="188" text-anchor="middle" font-size="11" fill="#6b6358">:5173</text>

  <!-- Gateway / Megaservice -->
  <rect x="280" y="100" width="200" height="120" rx="8" fill="#fdf0e2" stroke="#FBAA60" stroke-width="2"/>
  <text x="380" y="128" text-anchor="middle" font-size="14" font-weight="bold" fill="#14110f">MegaService Gateway</text>
  <text x="380" y="148" text-anchor="middle" font-size="11" fill="#6b6358">FastAPI · :8888</text>
  <rect x="300" y="160" width="160" height="44" rx="6" fill="#eaf3ed" stroke="#1a472a" stroke-width="1.5"/>
  <text x="380" y="178" text-anchor="middle" font-size="11" fill="#14110f">Document Loader</text>
  <text x="380" y="194" text-anchor="middle" font-size="10" fill="#6b6358">pdf · docx · txt · md</text>

  <!-- LLM microservice -->
  <rect x="580" y="120" width="170" height="80" rx="8" fill="#e3f0f7" stroke="#5b9bd5" stroke-width="2"/>
  <text x="665" y="150" text-anchor="middle" font-size="14" font-weight="bold" fill="#14110f">LLM Microservice</text>
  <text x="665" y="172" text-anchor="middle" font-size="11" fill="#6b6358">TGI / vLLM</text>
  <text x="665" y="188" text-anchor="middle" font-size="11" fill="#6b6358">:8008</text>

  <!-- arrows -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#14110f"/>
    </marker>
  </defs>
  <line x1="180" y1="160" x2="278" y2="160" stroke="#14110f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="480" y1="150" x2="578" y2="150" stroke="#14110f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="578" y1="172" x2="482" y2="172" stroke="#14110f" stroke-width="1.6" marker-end="url(#arrow)" stroke-dasharray="4 3"/>
  <text x="528" y="140" text-anchor="middle" font-size="10" fill="#6b6358">compare</text>
  <text x="528" y="190" text-anchor="middle" font-size="10" fill="#6b6358">findings (JSON)</text>

  <!-- verdict legend -->
  <rect x="280" y="265" width="470" height="70" rx="8" fill="#faf8f3" stroke="#d8d1c2" stroke-width="1.5"/>
  <text x="300" y="288" font-size="12" font-weight="bold" fill="#14110f">Verdict rules</text>
  <circle cx="308" cy="307" r="6" fill="#8c1c13"/>
  <text x="320" y="311" font-size="11" fill="#14110f">BLOCK — conflicts with Global policy</text>
  <circle cx="308" cy="325" r="6" fill="#b06a00"/>
  <text x="320" y="329" font-size="11" fill="#14110f">WARN — conflicts only with Regional override</text>
  <circle cx="560" cy="307" r="6" fill="#1a472a"/>
  <text x="572" y="311" font-size="11" fill="#14110f">PASS — SOP aligned with sources</text>
</svg>
